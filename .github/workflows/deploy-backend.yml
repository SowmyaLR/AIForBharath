name: Deploy Backend to ECS

on:
  push:
    branches:
      - main
      - infra_setup
    paths:
      - "server/**"
      - ".github/workflows/deploy-backend.yml"

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: vaidyasaarathi-demo-v2-api
  ECS_SERVICE: vaidyasaarathi-demo-v2-api
  ECS_CLUSTER: vaidyasaarathi-demo-v2-main
  ECS_TASK_DEFINITION: .aws/task-definition.json # Optional, but good for local stability
  CONTAINER_NAME: vaidyasaarathi-server

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: demo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        working-directory: ./server
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build a docker container and push it to ECR
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update ECS Service
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE }} --force-new-deployment
